<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>前端整蛊练习demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #fff;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .overlay.hidden { display: none; }
    #start-btn {
      margin-top: 20px;
      padding: 16px 32px;
      font-size: 18px;
      background: #007fff;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor:pointer;
    }
    .scare-container {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      z-index: 9999999;
      display: none;
    }
    .scare-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

  </div>
