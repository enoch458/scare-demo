<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>整蛊练习</title>
  <style>
    *{margin:0;padding:0;}
    body{overflow:hidden;background:#000;}
    .start{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:#fff;}
    #btn{padding:20px 40px;font-size:18px;background:#007fff;color:white;border:none;border-radius:8px;cursor:pointer;}
    #scare{display:none;width:100vw;height:100vh;position:fixed;top:0;left:0;background:#000;}
    #scare img{width:100%;height:100%;object-fit:cover;}
  </style>
</head>
<body>

<div class="start">
  <button id="btn">同意协议继续</button>
</div>

<div id="scare">
  <img src="https://picsum.photos/1920/1080">
  <audio id="audio" src="scare.mp3"></audio>
</div>

<script>
const btn = document.getElementById('btn');
const scare = document.getElementById('scare');
const audio = document.getElementById('audio');

btn.onclick = function(){
  document.querySelector(".start").style.display="none";
  scare.style.display="block";
  audio.play().catch(()=>{});
  try{document.documentElement.requestFullscreen()}catch(e){}
}
</script>
</body>
</html>
