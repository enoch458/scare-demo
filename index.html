<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>整蛊练习</title>
  <style>
    body{margin:0;padding:0;overflow:hidden;background:white;}
    .btn-area{width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;}
    #btn{padding:20px 40px;font-size:18px;background:#007fff;color:white;border:none;border-radius:8px;cursor:pointer;}
    #scare{display:none;width:100vw;height:100vh;position:fixed;top:0;left:0;}
    #scare img{width:100%;height:100%;object-fit:cover;}
  </style>
</head>
<body>

<div class="btn-area">
  <button id="btn">同意协议并继续</button>
</div>

<div id="scare">
  <img src="scare.jpg">
  <audio id="audio" src="scare.mp3"></audio>
</div>

<script>
const btn = document.getElementById('btn');
const scare = document.getElementById('scare');
const audio = document.getElementById('audio');

btn.addEventListener('click', function(){
  document.querySelector('.btn-area').style.display = 'none';
  scare.style.display = 'block';
  audio.play().catch(()=>{});
  
  try{
    document.documentElement.requestFullscreen();
  }catch(e){}
});
</script>
</body>
</html>
